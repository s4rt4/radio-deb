<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Radio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="player-card">
      <div id="titleDragRegion" class="title-row">
        <h1>Classic Radio</h1>
        <button id="favoriteBtn" class="icon-button" title="Favorite station" aria-pressed="false">
          <span class="ui-icon icon-star" aria-hidden="true"></span>
        </button>
        <button id="miniModeBtn" class="icon-button" title="Mini mode" aria-pressed="false">
          <span class="ui-icon icon-mini" aria-hidden="true"></span>
        </button>
        <button id="manageToggle" class="icon-button" title="Manage stations">
          <span class="ui-icon icon-menu" aria-hidden="true"></span>
        </button>
        <button id="minimizeBtn" class="window-button" title="Minimize">
          <span class="ui-icon icon-minus" aria-hidden="true"></span>
        </button>
        <button id="closeBtn" class="window-button" title="Close to tray">
          <span class="ui-icon icon-close" aria-hidden="true"></span>
        </button>
      </div>

      <div class="source-select">
        <label><input type="radio" name="source" value="1" checked> Indonesia</label>
        <label><input type="radio" name="source" value="2"> Luar Negri</label>
        <button id="favoritesFilterBtn" class="source-filter" type="button" aria-pressed="false">Favorites</button>
      </div>

      <div id="stationSelect" class="station-select">
        <button id="stationSelectButton" class="station-select-button" type="button">
          <span id="stationSelectLabel"></span>
          <span class="ui-icon icon-chevron" aria-hidden="true"></span>
        </button>
        <div id="stationMenu" class="station-menu" hidden></div>
      </div>

      <div class="controls">
        <button id="prevBtn" title="Previous"><span class="ui-icon icon-prev" aria-hidden="true"></span></button>
        <button id="playBtn" class="primary-play-button" title="Play"><span class="ui-icon icon-play" aria-hidden="true"></span></button>
        <button id="nextBtn" title="Next"><span class="ui-icon icon-next" aria-hidden="true"></span></button>
        <button id="muteBtn" title="Mute"><span class="ui-icon icon-volume" aria-hidden="true"></span></button>
        <div class="volume-control">
          <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
          <span id="volumePercent">100%</span>
        </div>
      </div>

      <canvas id="visualizer"></canvas>
      <p id="status">Select a station to play</p>
    </section>
  </main>

  <audio id="radio" crossorigin="anonymous"></audio>

  <script type="module" src="/main.js"></script>
</body>
</html>
